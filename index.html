<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Memory Game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="index.js"></script>
  </head>
  <body>
    <h1>Pokemon Memory Game</h1>

    <div id="controls">
      <select id="difficulty">
        <option value="easy">Easy (3 pairs, 60s)</option>
        <option value="medium">Medium (6 pairs, 45s)</option>
        <option value="hard">Hard (9 pairs, 30s)</option>
      </select>
      <button id="start">Start</button>
      <button id="reset">Reset</button>
      <button id="peek">Power Up (Peek)</button>
      <button id="theme-toggle">Dark Mode</button>
    </div>

    <div id="status">
      <span>Time: <b id="time">0</b>s</span>
      <span>Clicks: <b id="clicks">0</b></span>
      <span>Matched: <b id="matched">0</b></span>
      <span>Pairs Left: <b id="pairs-left">0</b></span>
      <span>Total Pairs: <b id="total">0</b></span>
    </div>

    <div id="message"></div>
    <div id="game_grid"></div>
  </body>
</html>
